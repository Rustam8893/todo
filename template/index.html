<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            padding: 20px;
        }

        /* Konteyner va Header */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 900;
            color: #000000;
        }

        /* Input va Qo'shish tugmasi */
        .input-form {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            max-width: 500px;
        }

        .input-field {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }

        .input-field::placeholder {
            color: #a9a9a9;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-add:hover {
            background-color: #218838;
        }

        /* Muvaffaqiyat xabari (Success Alert) */
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 16px;
            border-left: 5px solid #c3e6cb; /* Bir oz to'qroq chegara */
        }

        /* Ro'yxat elementlari */
        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .todo-text {
            font-size: 16px;
            color: #000000;
        }

        .todo-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Tugmalar guruhi */
        .actions-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-edit {
            background-color: #007bff;
        }

        .btn-edit:hover {
            background-color: #0069d9;
        }

        .btn-delete {
            background-color: #dc3545;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        .btn-cross {
            background-color: #ffc107;
            color: #212529;
        }

        .btn-cross:hover {
            background-color: #e0a800;
        }
    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="logo-area">
                <i class="fa-solid fa-check"></i> to do list
            </div>
            <form class="input-form" method="post" action="{% url 'index' %}">
                {% csrf_token %}
                <input type="text" name="title" class="input-field" placeholder="Add Item" required>
                <button type="submit" class="btn-add">Add Item</button>
            </form>
        </header>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <ul class="todo-list">
            {% for task in tasks %}
            <li class="todo-item">
                <span class="todo-text {% if task.completed %}completed{% endif %}">{{ task.title }}</span>
                <div class="actions-group">
                    <a class="btn btn-edit" href="{% url 'edit_task' task.id %}">Edit</a>
                    <form method="post" action="{% url 'delete_task' task.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button class="btn btn-delete" type="submit">Delete</button>
                    </form>
                    <form method="post" action="{% url 'change_status' task.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button class="btn btn-cross" type="submit">{% if task.completed %}Uncross{% else %}Cross Off{% endif %}</button>
                    </form>
                </div>
            </li>
            {% empty %}
            <li class="todo-item">
                <span class="todo-text">No tasks yet. Add one above.</span>
            </li>
            {% endfor %}
        </ul>

    </div>

</body>
</html>
